<svg width="240" height="280" viewBox="0 0 240 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Beige plastic gradients matching landing page -->
    <linearGradient id="beigePlastic" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d9c6ad;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c9b598;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8a882;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="bezelSheen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d9bf;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d9c6ad;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="screenBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f19;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#141e32;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="controlBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4c5a9;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#c9b598;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8a882;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer plastic bezel - main body -->
  <rect x="20" y="15" width="200" height="160" rx="25" fill="url(#beigePlastic)" stroke="#9d8a6f" stroke-width="2"/>
  
  <!-- Bezel top/left highlight for 3D effect -->
  <path d="M 35 35 Q 45 25 65 20 L 185 20 Q 205 25 215 35" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Bezel bottom/right shadow for 3D effect -->
  <path d="M 25 165 Q 35 210 50 215 L 190 215 Q 205 210 215 165" fill="none" stroke="rgba(0,0,0,0.25)" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Inner bezel border (beveled) -->
  <rect x="35" y="30" width="170" height="145" rx="20" fill="none" stroke="#d4c5a9" stroke-width="4"/>
  
  <!-- Screen background -->
  <rect x="45" y="42" width="150" height="115" rx="12" fill="url(#screenBg)" stroke="#00ff41" stroke-width="1.5"/>
  
  <!-- Screen scanline effect (subtle) -->
  <defs>
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="150" height="2">
      <line x1="0" y1="0" x2="150" y2="0" stroke="rgba(0,255,65,0.015)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect x="45" y="42" width="150" height="115" fill="url(#scanlines)" rx="12"/>
  
  <!-- Control panel base -->
  <g transform="translate(20, 175)">
    <!-- Panel background -->
    <rect x="0" y="0" width="200" height="75" rx="8" fill="url(#controlBg)" stroke="#9d8a6f" stroke-width="1.5"/>
    
    <!-- Panel top highlight -->
    <path d="M 8 8 Q 12 3 25 3 L 195 3 Q 210 3 210 8" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Panel bottom shadow -->
    <path d="M 10 70 L 190 70 Q 200 72 200 75" fill="none" stroke="rgba(0,0,0,0.2)" stroke-width="1.5" stroke-linecap="round"/>
    
    <!-- Left control section - Joystick area -->
    <g transform="translate(25, 20)">
      <circle cx="0" cy="0" r="22" fill="#d4af91" stroke="#8b6f47" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="20" fill="url(#bezelSheen)" stroke="#a67c52" stroke-width="1"/>
      <circle cx="0" cy="0" r="15" fill="#c9b598" stroke="#8b6f47" stroke-width="0.5"/>
      <circle cx="0" cy="0" r="4" fill="#4a4a4a" stroke="#2a2a2a" stroke-width="0.5"/>
    </g>
    
    <!-- Center buttons section -->
    <g transform="translate(100, 20)">
      <!-- Button 1 -->
      <circle cx="-15" cy="0" r="8" fill="#d4af91" stroke="#8b6f47" stroke-width="1"/>
      <circle cx="-15" cy="0" r="6" fill="#c9b598" stroke="#8b6f47" stroke-width="0.5"/>
      
      <!-- Button 2 -->
      <circle cx="0" cy="0" r="8" fill="#d4af91" stroke="#8b6f47" stroke-width="1"/>
      <circle cx="0" cy="0" r="6" fill="#c9b598" stroke="#8b6f47" stroke-width="0.5"/>
      
      <!-- Button 3 -->
      <circle cx="15" cy="0" r="8" fill="#d4af91" stroke="#8b6f47" stroke-width="1"/>
      <circle cx="15" cy="0" r="6" fill="#c9b598" stroke="#8b6f47" stroke-width="0.5"/>
      
      <!-- Button row 2 -->
      <!-- Button 4 -->
      <circle cx="-15" cy="20" r="8" fill="#d4af91" stroke="#8b6f47" stroke-width="1"/>
      <circle cx="-15" cy="20" r="6" fill="#c9b598" stroke="#8b6f47" stroke-width="0.5"/>
      
      <!-- Button 5 -->
      <circle cx="0" cy="20" r="8" fill="#d4af91" stroke="#8b6f47" stroke-width="1"/>
      <circle cx="0" cy="20" r="6" fill="#c9b598" stroke="#8b6f47" stroke-width="0.5"/>
      
      <!-- Button 6 -->
      <circle cx="15" cy="20" r="8" fill="#d4af91" stroke="#8b6f47" stroke-width="1"/>
      <circle cx="15" cy="20" r="6" fill="#c9b598" stroke="#8b6f47" stroke-width="0.5"/>
    </g>
    
    <!-- Right indicators section -->
    <g transform="translate(170, 20)">
      <!-- Green indicator (on) -->
      <circle cx="0" cy="-10" r="6" fill="#d4af91" stroke="#8b6f47" stroke-width="1"/>
      <circle cx="0" cy="-10" r="4" fill="#00ff41" stroke="#00aa00" stroke-width="0.5"/>
      
      <!-- Red indicator (off) -->
      <circle cx="0" cy="5" r="6" fill="#d4af91" stroke="#8b6f47" stroke-width="1"/>
      <circle cx="0" cy="5" r="4" fill="#cc0000" stroke="#660000" stroke-width="0.5"/>
      
      <!-- Yellow indicator (off) -->
      <circle cx="0" cy="20" r="6" fill="#d4af91" stroke="#8b6f47" stroke-width="1"/>
      <circle cx="0" cy="20" r="4" fill="#ffaa00" stroke="#cc6600" stroke-width="0.5"/>
    </g>
  </g>
  
</svg>
